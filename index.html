<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>お馬さんトレジャー V2</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="お馬さんトレジャー V2">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23f97316%22/><text y=%2254%25%22 x=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22>🐴</text></svg>">
  
  <!-- 丸くて可愛いWebフォントを読み込む -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  
  <script>
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 180;
      canvas.height = 180;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f97316';
      ctx.fillRect(0, 0, 180, 180);
      ctx.font = '100px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐴', 90, 100);
      const link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.href = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    })();
  </script>
  
  <!-- ライブラリ読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* 全体のフォントを可愛い丸ゴシックに統一 */
    body { font-family: 'Zen Maru Gothic', sans-serif; }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 237, 213, 0.5); border-radius: 10px; margin: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251, 146, 60, 0.6); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.9); }
    
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    .toast-anim { animation: slideDown 0.3s ease-out forwards; }

    /* 背景のドットを無限スクロールさせる */
    @keyframes movePattern {
      0% { background-position: 0 0; }
      100% { background-position: 24px 24px; }
    }
    .bg-animated {
      background-image: radial-gradient(#ffb74d 2px, transparent 2px);
      background-size: 24px 24px;
      animation: movePattern 2s linear infinite;
    }

    /* 桃鉄風の派手で可愛いタイトル文字 (見やすさ大幅改善) */
    .momo-title span {
      display: inline-block;
      font-weight: 900;
      /* 白フチを太くつけて背景色と同化しないようにする */
      text-shadow: 
        2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff,
        0px 2px 0 #fff, 0px -2px 0 #fff, 2px 0px 0 #fff, -2px 0px 0 #fff,
        4px 5px 0 #6D4C41, /* 濃い茶色の影でシールっぽく立体感を出す */
        5px 7px 3px rgba(0,0,0,0.3);
      animation: charBounce 1.5s infinite;
      margin: 0 2px; /* 文字間を少し開ける */
      letter-spacing: -2px;
    }
    /* パステル＆ビビッドでポップな色合い */
    .momo-title span:nth-child(1) { color: #FF5252; animation-delay: 0.0s; } /* お */
    .momo-title span:nth-child(2) { color: #FF9800; animation-delay: 0.1s; } /* 馬 */
    .momo-title span:nth-child(3) { color: #FFEB3B; animation-delay: 0.2s; } /* さ */
    .momo-title span:nth-child(4) { color: #4CAF50; animation-delay: 0.3s; } /* ん */
    .momo-title span:nth-child(5) { color: #00BCD4; animation-delay: 0.4s; } /* ト */
    .momo-title span:nth-child(6) { color: #2196F3; animation-delay: 0.5s; } /* レ */
    .momo-title span:nth-child(7) { color: #9C27B0; animation-delay: 0.6s; } /* ジ */
    .momo-title span:nth-child(8) { color: #E91E63; animation-delay: 0.7s; } /* ャ */
    .momo-title span:nth-child(9) { color: #FF5252; animation-delay: 0.8s; } /* ー */
    
    @keyframes charBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.05) rotate(3deg); }
    }

    /* 常時画面を漂うパーティクル（絵文字） */
    @keyframes floatUp {
      0% { transform: translateY(105vh) rotate(0deg) scale(0.8); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
    }
    .bg-particle {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      animation: floatUp linear infinite;
    }

    @keyframes horseDash {
      0% { transform: translateX(-3px) skewX(0deg); }
      50% { transform: translateX(3px) skewX(-15deg); }
      100% { transform: translateX(-3px) skewX(0deg); }
    }
    .horse-dash { display: inline-block; animation: horseDash 0.2s infinite; }

    @keyframes goldPulse {
      0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); border-color: #facc15; }
      70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); border-color: #fbbf24; }
      100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); border-color: #facc15; }
    }
    .gold-pulse {
      animation: goldPulse 2s infinite;
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border-width: 3px;
    }

    .fun-input { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .fun-input:focus {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.35);
      z-index: 10;
    }
    
    @keyframes hop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .hover-hop:hover { animation: hop 0.4s ease; }

    /* ぴょこぴょこ跳ねるアニメーション */
    @keyframes pyokoPyoko {
      0% { transform: translateX(-50%) translateY(0) rotate(-10deg); }
      50% { transform: translateX(-50%) translateY(-12px) rotate(10deg); }
      100% { transform: translateX(-50%) translateY(0) rotate(-10deg); }
    }

    .racing-horse {
      position: absolute;
      /* バーの上部にしっかり配置されるように上にずらす */
      top: -34px; 
      /* サイズを大きくして全面に目立たせる */
      font-size: 2.8rem; 
      /* 他の要素より確実に手前に来るようにz-indexを高く設定 */
      z-index: 100; 
      transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      /* 影をつけて浮遊感を出す */
      filter: drop-shadow(0 6px 4px rgba(0,0,0,0.4));
      /* ぴょこぴょこアニメーションを適用 */
      animation: pyokoPyoko 0.35s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-[#FFF8E1] text-gray-900 min-h-screen pb-10 relative bg-animated overflow-x-hidden">

  <!-- トースト通知 -->
  <div id="toast" class="hidden fixed top-4 left-1/2 z-50 flex items-center px-5 py-3 rounded-2xl shadow-lg font-bold text-sm toast-anim text-white">
    <span id="toastMsg"></span>
  </div>

      <button onclick="document.getElementById('errorLogModal').classList.add('hidden')" class="px-4 py-3 bg-red-500 hover:bg-red-600 text-white font-black rounded-2xl active:scale-95 transition-all shadow-[0_4px_0_#991b1b]">閉じる</button>
    </div>
  </div>

  <!-- ログイン画面 -->

    <div class="bg-white/95 backdrop-blur-md p-6 sm:p-8 rounded-[2rem] shadow-2xl max-w-md w-full border-4 border-yellow-400">
      <div class="flex justify-center mb-6 relative">
        <div class="p-4 bg-gradient-to-tr from-orange-100 to-yellow-50 rounded-full border-2 border-orange-300 shadow-inner relative z-10 animate-bounce">
          <i data-lucide="bot" class="w-16 h-16 text-orange-600"></i>
        </div>
        <!-- 周りのお祭り装飾 -->
        <span class="absolute top-0 right-10 text-3xl animate-pulse" style="animation-delay: 0.1s">🎉</span>
        <span class="absolute top-4 left-10 text-3xl animate-pulse" style="animation-delay: 0.3s">💰</span>
        <span class="absolute -bottom-2 right-12 text-3xl animate-pulse" style="animation-delay: 0.5s">🐴</span>
      </div>
      
      <!-- 桃鉄風ド派手で可愛いタイトル -->
      <h1 class="text-[2rem] sm:text-4xl font-black text-center mb-3 flex justify-center items-end momo-title tracking-tight pb-2">
        <span>お</span><span>馬</span><span>さ</span><span>ん</span><br class="sm:hidden"/><span>ト</span><span>レ</span><span>ジ</span><span>ャ</span><span>ー</span><span class="text-2xl ml-2 text-red-500 drop-shadow-md" style="animation: none; transform: translateY(-5px);">V2</span>
      </h1>
      
      <p class="text-center text-xs font-black text-orange-900 mb-8 bg-yellow-300/80 py-2 px-5 rounded-full mx-auto block w-fit shadow-sm border-2 border-yellow-400">お祭りUI 大幅強化版！🎊</p>
      
      <form id="loginForm" class="space-y-5 relative z-10">
        <div>
          <label class="block text-sm font-bold text-gray-800 mb-2 ml-1">APIキー (パスワード)</label>
          <input 
            type="password" 
            id="apiKeyInput"
            class="w-full bg-gray-50 border-2 border-gray-300 rounded-2xl px-4 py-4 text-base font-bold text-gray-900 outline-none focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-200 transition-all fun-input"
            placeholder="Gemini API Key (テストは 'demo')"
            required
          />
        </div>
        <button 
          type="submit"
          class="w-full flex justify-center items-center px-6 py-4 bg-gradient-to-b from-gray-800 to-black hover:from-black hover:to-gray-900 text-white font-black rounded-2xl shadow-[0_6px_0_#333] active:shadow-[0_0px_0_#333] active:translate-y-[6px] transition-all text-lg"
        >
          出発進行ーっ！ 🚂💨
        </button>
      </form>
    </div>
  </div>

  <div id="mainApp" class="hidden max-w-6xl mx-auto space-y-4 p-3 sm:p-4 relative z-10">
    <!-- ナビゲーション -->
    <div class="flex justify-end gap-2 px-1 relative z-20">
      <button onclick="window.open('https://www.jra.go.jp/kouyu/app/', '_blank')" class="flex items-center gap-1.5 px-4 py-2 bg-white/90 backdrop-blur-sm text-green-800 text-xs font-black rounded-full border-2 border-green-300 hover:bg-green-100 shadow-sm active:scale-95 transition-all">
        <i data-lucide="smartphone" class="w-4 h-4"></i> アプリ
      </button>
      <button onclick="window.open('https://www.ipat.jra.go.jp/', '_blank')" class="flex items-center gap-1.5 px-4 py-2 bg-green-600 text-white text-xs font-black rounded-full hover:bg-green-700 shadow-sm active:scale-95 transition-all border-2 border-green-700">
        <i data-lucide="external-link" class="w-4 h-4"></i> 即PAT
      </button>
    </div>

    <!-- ヘッダー -->
    <header class="bg-gradient-to-r from-orange-400 via-red-400 to-pink-500 rounded-[2rem] p-3 sm:p-5 flex items-center justify-between shadow-lg relative overflow-hidden border-b-4 border-orange-600">
      <div class="absolute -right-2 -top-2 opacity-30 text-7xl animate-pulse">🏇</div>
      <div class="absolute left-1/4 -top-6 opacity-20 text-6xl rotate-12">🎉</div>
      <div class="absolute left-1/2 bottom-0 opacity-20 text-5xl -rotate-12">💰</div>

      <div class="flex items-center space-x-3 relative z-10">
        <div class="p-2 sm:p-3 bg-white/30 backdrop-blur-md rounded-2xl border-2 border-white/50 text-yellow-100 shadow-inner">
          <i data-lucide="trophy" class="w-6 h-6 sm:w-8 sm:h-8"></i>
        </div>
        <div>
          <!-- ヘッダータイトルも見やすく！ -->
          <h1 class="text-xl sm:text-3xl font-black leading-tight flex items-end momo-title tracking-tight pb-1">
             <span>お</span><span>馬</span><span>さ</span><span>ん</span><span class="hidden sm:inline">ト</span><span class="hidden sm:inline">レ</span><span class="hidden sm:inline">ジ</span><span class="hidden sm:inline">ャ</span><span class="hidden sm:inline">ー</span><span class="text-lg sm:text-xl ml-1 text-red-200 drop-shadow-sm" style="animation: none;">V2</span>
          </h1>
          <p class="text-[10px] sm:text-xs text-white font-black mt-1 drop-shadow-md bg-black/20 px-2 py-0.5 rounded-full w-fit">✨ 高精度アナリストモード稼働中 ✨</p>
        </div>
      </div>
      <button onclick="app.renderRankings(true)" class="flex items-center px-4 py-3 sm:px-6 sm:py-3 font-black text-orange-900 bg-yellow-400 rounded-2xl hover:bg-yellow-300 shadow-[0_5px_0_#E65100] active:shadow-[0_0px_0_#E65100] active:translate-y-[5px] transition-all text-xs sm:text-base relative z-10 border-2 border-yellow-500">
        <i data-lucide="sparkles" class="w-5 h-5 mr-1 text-orange-800"></i> <span class="hidden sm:inline">再計算する！</span><span class="sm:hidden">計算</span>
      </button>
    </header>

    <!-- コントロールパネル -->
    <div class="bg-white/95 backdrop-blur-md p-3 sm:p-5 rounded-[2rem] border-4 border-white shadow-xl flex flex-col gap-3 relative z-10">
      <div class="relative w-full">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i data-lucide="search" class="w-6 h-6 text-blue-600"></i>
        </div>
        <select id="raceSelect" onchange="app.changeRace(this.value)" class="w-full bg-blue-50 border-2 border-blue-200 rounded-2xl pl-12 pr-10 py-4 text-sm sm:text-base font-black text-blue-900 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 transition-all appearance-none cursor-pointer shadow-sm fun-input">
          <option value="" disabled selected>👉 ここをタップしてレースを選ぶか、AIに探してもらおう！</option>
        </select>
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
          <i data-lucide="chevron-down" class="w-6 h-6 text-blue-500"></i>
        </div>
      </div>
      <button id="aiBtn" onclick="app.researchAI()" class="w-full flex justify-center items-center px-4 py-4 bg-gradient-to-b from-blue-500 to-blue-700 hover:from-blue-400 hover:to-blue-600 text-white font-black rounded-2xl shadow-[0_6px_0_#1E3A8A] active:shadow-[0_0px_0_#1E3A8A] active:translate-y-[6px] transition-all text-base sm:text-xl border-2 border-blue-800">
        <i data-lucide="bot" id="aiBtnIcon" class="w-7 h-7 mr-2"></i> 
        <span id="aiBtnText">最新データで差分調査＆更新する 🚀</span>
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 relative z-10">
      <!-- 左側：データ入力パネル -->
      <div class="space-y-3">
        <div class="bg-white/95 backdrop-blur-sm rounded-[2rem] border-4 border-orange-300 shadow-xl overflow-hidden min-h-[300px] flex flex-col relative">
          <div class="absolute bottom-0 left-0 opacity-[0.05] text-9xl pointer-events-none -mb-4 -ml-4">🐴</div>

          <div class="p-4 bg-gradient-to-r from-orange-100 to-yellow-50 flex justify-between items-center border-b-4 border-orange-200">
            <div>
              <h2 id="raceTitle" class="text-base sm:text-lg font-black text-orange-900 flex items-center drop-shadow-sm">
                <i data-lucide="flag" class="w-5 h-5 mr-1.5 text-orange-700"></i> データ入力ステーション
              </h2>
              <p id="raceSubtitle" class="text-[10px] sm:text-xs font-bold text-orange-800 flex items-center mt-1 hidden bg-white/80 px-2 py-0.5 rounded-md w-fit border border-orange-300 shadow-sm">
                <i data-lucide="calendar" class="w-3 h-3 mr-1"></i> <span id="raceSubtitleText"></span>
              </p>
            </div>
            <button onclick="app.addHorse()" class="flex items-center px-4 py-2.5 bg-white border-2 border-orange-400 text-orange-800 hover:bg-orange-100 text-xs sm:text-sm font-black rounded-2xl shadow-[0_4px_0_#FB8C00] active:shadow-[0_0px_0_#FB8C00] active:translate-y-[4px] transition-all">

          <div id="emptyDataMsg" class="flex-1 flex flex-col items-center justify-center min-h-[250px] text-orange-800">
            <div class="relative">
              <i data-lucide="bot" class="w-20 h-20 mb-4 text-orange-400 animate-bounce"></i>
              <span class="absolute -top-2 -right-4 text-4xl animate-pulse">🎯</span>
            </div>
            <p class="font-black text-lg text-orange-800 bg-orange-100 px-6 py-3 rounded-full border-2 border-orange-300 shadow-sm">上の青いボタンで調査を開始！</p>

                <div class="col-span-2">オッズ</div>
                <div class="col-span-2">SPEED</div>
                <div class="col-span-3 flex justify-center gap-3"><span>騎手</span><span>調子</span><span>適性</span></div>
                <div class="col-span-1"></div>
              </div>
              <div id="horseList" class="space-y-3 mt-2"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右側：解析結果パネル -->
      <div class="space-y-3">
        <div class="bg-white/95 backdrop-blur-sm rounded-[2rem] border-4 border-pink-300 shadow-xl overflow-hidden min-h-[400px] flex flex-col">

                <span class="animate-pulse">🎉</span><span class="animate-bounce">🎯</span><span>👑</span><span class="animate-pulse">🥕</span><span class="animate-bounce">💸</span><span>🎉</span>
            </div>
            <h2 class="text-lg sm:text-2xl font-black text-white flex items-center relative z-10 drop-shadow-md tracking-widest">
              <i data-lucide="target" class="w-7 h-7 mr-2 text-pink-400"></i> ✨ お宝ランキング ✨
            </h2>
          </div>
          
          <div id="rankingContainer" class="p-4 sm:p-5 bg-gradient-to-b from-gray-100 to-pink-50/50 min-h-[350px] flex-1">
             <div id="emptyRankingMsg" class="flex flex-col items-center justify-center py-16 text-gray-500">
              <i data-lucide="target" class="w-20 h-20 mb-4 text-gray-400"></i>
              <p class="font-black text-lg text-gray-600">データがありません</p>
            </div>
            <div id="rankingList" class="space-y-6"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const apiKey = ""; 

    // --- 📋 要求履歴・実装履歴の自己チェック機能 ---
    const appHistory = [
      { date: "2026-06-20", detail: "APIキー入力とdemoキー対応の実装" },
      { date: "2026-06-21", detail: "APIからモデル一覧を自動取得し、PROを除外した中で最適なモデルを自動選択" },

            requestKey = apiKey; 
            candidateModelsNames = ["gemini-2.5-flash-preview-09-2025"];
          } else {
            try {
              const modelsUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${requestKey}`;
              const modelsRes = await fetch(modelsUrl);
              if (modelsRes.ok) {
                const modelsData = await modelsRes.json();
                const candidateModels = modelsData.models.filter(m => 
                  m.supportedGenerationMethods.includes("generateContent") &&
                  m.name.toLowerCase().includes("gemini") &&
                  !m.name.toLowerCase().includes("pro") &&
                  !m.name.toLowerCase().includes("lite") &&

                if (candidateModels.length > 0) {
                  candidateModels.sort((a, b) => {
                    const getVer = name => parseFloat(name.match(/\d+\.\d+/) || [0]);
                    return (getVer(b.name) - getVer(a.name)) || (a.name.length - b.name.length);
                  });
                  candidateModelsNames = candidateModels.map(m => m.name.split('/').pop());
                }
              }
            } catch (e) {
              appLogger.log('error', 'モデル一覧取得通信エラー', { error: e.message });
            }
          }

          const prompt = `
            あなたはプロの競馬データアナリストです。現在は${new Date().toLocaleDateString('ja-JP')}です。
            以下の【現在のデータ】をベースに、Google検索を用いて最新のJRA出馬表（netkeiba等）を調査し、データの【差分更新】を行ってください。

            ${JSON.stringify(state.races)}

            3. 出走取消の馬がいれば、リストから除外してください。
            4. 各パラメータの評価基準を明確にし、より正確に再計算してください:
               - speed: 過去のスピード指数やタイム実績を元に算出 (1-100)
               - jockey: 騎手のコース勝率やリーディング順位を元に算出 (1-10)
               - condition: 最終追い切りの評価（A〜Cなど）や陣営コメントから算出 (1-5)
               - suitability: コース（芝/ダート、距離）の適性や血統から算出 (1-5)
            5. 現在のデータにない、今週末の注目重賞レースがあれば新規に追加してください。

            【重要】出力は以下のJSON構造に厳密に従い、Markdownのコードブロックを含めず純粋なJSONのみ出力してください。
            {"races": [{"raceId": "文字列", "raceName": "文字列", "date": "文字列", "track": "文字列", "distance": "文字列", "horses": [{"id": 1, "number": 1, "name": "文字列", "odds": 1.0, "speed": 50, "jockey": 5, "condition": 3, "suitability": 3}]}]}
          `;

          let data;
          let success = false;

          for (let modelIdx = 0; modelIdx < candidateModelsNames.length; modelIdx++) {
            const targetModel = candidateModelsNames[modelIdx];
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${requestKey}`;
            const delays = [1000, 2000, 4000];
            
            for (let i = 0; i < delays.length; i++) {
              try {
                const res = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    tools: [{ google_search: {} }], 
                    systemInstruction: { parts: [{ text: "JSONフォーマットのみ出力せよ。" }]}
                  })
                });
                
                if (res.ok) {
                  data = await res.json();
                  success = true;
                  break;
                }
              } catch (e) {
                 // ignore in loop
              }
              if (!success && i < delays.length - 1) await new Promise(r => setTimeout(r, delays[i]));
            }
            if (success) break;
          }

          if (!success || !data) throw new Error("AI調査に失敗しました。時間をおいて再試行してください。");

          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            btn.innerHTML = `<i data-lucide="loader-2" class="w-7 h-7 mr-2 animate-spin"></i> 保存中...`;
            lucide.createIcons();
            
            const jsonMatch = text.match(/\{[\s\S]*\}/);

                  else state.races.push(race);

                firePartyConfetti();

    function renderRankingPanel(playEffect = false) {
      const rankingList = document.getElementById('rankingList');
      const emptyMsg = document.getElementById('emptyRankingMsg');
      
      rankingList.innerHTML = '';

      if (!state.selectedRaceId || state.localHorses.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }
      emptyMsg.classList.add('hidden');

      const scoredHorses = state.localHorses.map(horse => {
        const rawScore = (Number(horse.speed) * 0.5) + (Number(horse.jockey) * 10 * 0.2) + (Number(horse.condition) * 20 * 0.15) + (Number(horse.suitability) * 20 * 0.15);
        return { ...horse, rawScore, weight: Math.pow(rawScore, 3) };
      });
      const totalWeight = scoredHorses.reduce((sum, h) => sum + h.weight, 0);

      const analyzed = scoredHorses.map(horse => {
        const predictedProb = totalWeight > 0 ? horse.weight / totalWeight : 0;
        const impliedProb = horse.odds > 0 ? 1 / Number(horse.odds) : 0;
        const expectedValue = predictedProb * Number(horse.odds);

        let evaluation = { label: 'C', word: '見送り', style: 'bg-gray-300 text-gray-800 border-gray-400 font-bold' };
        if (expectedValue >= 1.5) evaluation = { label: 'SS', word: '超大当たり!', style: 'bg-gradient-to-r from-pink-500 to-rose-600 text-white border-transparent shadow-[0_0_12px_rgba(236,72,153,0.9)]' };
        else if (expectedValue >= 1.2) evaluation = { label: 'S', word: '大チャンス', style: 'bg-gradient-to-r from-orange-500 to-orange-600 text-white border-transparent shadow-[0_0_10px_rgba(249,115,22,0.9)]' };
        else if (expectedValue >= 1.0) evaluation = { label: 'A', word: 'イイね!', style: 'bg-yellow-300 text-orange-900 border-yellow-500 font-black' };
        else if (expectedValue >= 0.8) evaluation = { label: 'B', word: 'おさえ', style: 'bg-blue-100 text-blue-900 border-blue-400 font-bold' };

        return {
          ...horse,
          predictedProb: (predictedProb * 100).toFixed(1),
          impliedProb: (impliedProb * 100).toFixed(1),
          expectedValue: expectedValue.toFixed(2),
          evaluation
        };
      }).sort((a, b) => b.expectedValue - a.expectedValue);

      if (playEffect && analyzed.length > 0 && analyzed[0].expectedValue >= 1.2) {
         firePartyConfetti();
      }

      analyzed.forEach((horse, index) => {
        const width = Math.min(horse.expectedValue * 100 / 2.0, 100);
        const barColor = horse.expectedValue >= 1.5 ? 'bg-gradient-to-r from-pink-500 to-rose-600' : horse.expectedValue >= 1.2 ? 'bg-gradient-to-r from-orange-400 to-orange-600' : horse.expectedValue >= 1.0 ? 'bg-gradient-to-r from-yellow-400 to-yellow-500' : 'bg-gray-400';
        const fireIcon = horse.expectedValue >= 1.0 ? '🔥 ' : '';
        const numColor = getNumberColor(horse.number);
        
        let rankIcon = '';
        let extraCardClass = '';
        let extraNameDecor = '';
        
        if (index === 0) {
            rankIcon = '<i data-lucide="crown" class="w-8 h-8 text-yellow-500 absolute -top-3 -left-3 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] z-20 animate-bounce"></i>';
            if(horse.expectedValue >= 1.2) {
                extraCardClass = 'gold-pulse scale-[1.02] z-10 border-yellow-400'; 
                extraNameDecor = '✨';
            }
        } else if (index === 1) rankIcon = '<i data-lucide="crown" class="w-6 h-6 text-gray-400 absolute -top-2 -left-2 drop-shadow-md z-10"></i>';
        else if (index === 2) rankIcon = '<i data-lucide="crown" class="w-6 h-6 text-orange-800 absolute -top-2 -left-2 drop-shadow-md z-10"></i>';

        rankingList.innerHTML += `
          <div class="bg-white rounded-3xl border-4 border-pink-200 p-4 sm:p-5 shadow-lg hover:shadow-xl transition-all relative overflow-visible ${extraCardClass}">
            <div class="flex justify-between items-center mb-4">
              <div class="flex items-center gap-3 relative z-10">
                <div class="relative">
                  ${rankIcon}
                  <div class="w-12 h-12 flex items-center justify-center rounded-2xl border-2 font-black text-xl shadow-md ${numColor}">${horse.number}</div>
                </div>
                <span class="font-black text-gray-900 text-xl sm:text-2xl tracking-tight drop-shadow-sm">${extraNameDecor}${horse.name}${extraNameDecor}</span>
              </div>
              <span class="text-sm sm:text-base font-black px-5 py-2.5 rounded-full border-2 ${horse.evaluation.style} relative z-10 tracking-widest shadow-sm">${horse.evaluation.word}</span>
            </div>

            <div class="mb-4 bg-gradient-to-b from-gray-50 to-white p-4 rounded-[1.5rem] border-2 border-gray-200 relative z-10 backdrop-blur-sm mt-8 shadow-inner overflow-visible">
              <div class="flex justify-between text-sm sm:text-base font-black mb-2">
                <span class="text-gray-800">期待値メーター</span>
                <span class="${horse.expectedValue >= 1.0 ? 'text-pink-600 text-lg drop-shadow-md' : 'text-gray-600'}">${fireIcon}${horse.expectedValue}</span>
              </div>
              
              <!-- ぴょこぴょこ跳ねるお馬さんが前面に来るように overflow-visible と z-index を調整 -->
              <div class="h-4 w-full bg-gray-200 rounded-full overflow-visible relative mt-5 shadow-inner border border-gray-300">
                <div class="racing-horse" style="left: ${width}%">🏇</div>
                <div class="absolute top-0 bottom-0 w-1 bg-red-600 z-10 shadow-[0_0_8px_red]" style="left: 50%"></div>
                <div class="h-full ${barColor} rounded-full transition-all duration-1000 ease-out relative z-0 shadow-sm" style="width: ${width}%"></div>
              </div>
            </div>

            <div class="flex justify-between text-center text-sm pt-2 px-3 relative z-10 bg-gray-100/80 rounded-2xl py-3 border-2 border-gray-200 shadow-inner">
              <div><p class="text-gray-700 mb-1 text-xs font-bold">AI勝率</p><p class="font-black text-blue-700 text-lg drop-shadow-sm">${horse.predictedProb}%</p></div>
              <div><p class="text-gray-700 mb-1 text-xs font-bold">みんなの勝率</p><p class="font-black text-gray-800 text-lg">${horse.impliedProb}%</p></div>
              <div><p class="text-gray-700 mb-1 text-xs font-bold">オッズ</p><p class="font-black text-orange-700 text-lg drop-shadow-sm">${horse.odds}倍</p></div>
            </div>
          </div>
        `;
      });
    }

    let toastTimeout;
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      toastMsg.innerText = msg;
      
      if (type === 'error') {
        toast.style.backgroundColor = '#fee2e2';
        toast.style.color = '#991b1b';
      } else {
        toast.style.backgroundColor = '#1f2937';
        toast.style.color = '#ffffff';
      }

      toast.classList.remove('hidden');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>
</body>
</html>

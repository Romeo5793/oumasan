<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ハッピー予想AI</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ウマ勝AI">
  
  <!-- iPhoneホーム画面用のアイコンを自動生成 -->
  <script>
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 180;
      canvas.height = 180;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f97316';
      ctx.fillRect(0, 0, 180, 180);
      ctx.font = '100px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐴', 90, 100);
      const link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.href = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    })();
  </script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 237, 213, 0.5); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251, 146, 60, 0.5); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.8); }
    
    @keyframes slideDown {
      from { transform: translate(-50%, -100%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    .toast-anim { animation: slideDown 0.3s ease-out forwards; }
  </style>
</head>
<body class="bg-[#FFFBF0] text-gray-800 font-sans min-h-screen">

  <div id="toast" class="hidden fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center px-4 py-2 rounded shadow-md font-bold text-sm toast-anim">
    <span id="toastMsg"></span>
  </div>

  <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border-4 border-yellow-300">

        <div class="p-4 bg-orange-100 rounded-full border-2 border-orange-200">

        </div>
      </div>
      <h1 class="text-2xl font-black text-center text-orange-800 mb-2">ハッピー予想AI</h1>

      <form id="loginForm" class="space-y-6">

          <label class="block text-sm font-bold text-gray-700 mb-2">APIキー (パスワード)</label>

          class="w-full flex justify-center items-center px-6 py-4 bg-gradient-to-r from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white font-black rounded-xl shadow-[0_4px_0_rgba(194,65,12,1)] active:shadow-[0_0px_0_rgba(194,65,12,1)] active:translate-y-[4px] transition-all"
        >
          アプリを起動する
        </button>

    </div>
  </div>

  <div id="mainApp" class="hidden max-w-6xl mx-auto space-y-4 p-2 sm:p-4">
    
    <div class="flex justify-end gap-2 px-1 mb-2">
      <button onclick="app.resetApiKey()" class="flex items-center gap-1 px-3 py-1 bg-white text-gray-500 text-xs font-bold rounded-full border border-gray-200 hover:bg-gray-50 transition-colors">
        <i data-lucide="key" class="w-3.5 h-3.5"></i> APIキー変更
      </button>
      <button onclick="window.open('https://www.jra.go.jp/kouyu/app/', '_blank')" class="flex items-center gap-1 px-3 py-1 bg-white text-green-700 text-xs font-bold rounded-full border border-green-200 hover:bg-green-50 transition-colors">
        <i data-lucide="smartphone" class="w-3.5 h-3.5"></i> アプリ
      </button>
      <button onclick="window.open('https://www.ipat.jra.go.jp/', '_blank')" class="flex items-center gap-1 px-3 py-1 bg-green-600 text-white text-xs font-bold rounded-full hover:bg-green-700 transition-colors">
        <i data-lucide="external-link" class="w-3.5 h-3.5"></i> 即PAT
      </button>
    </div>

    <header class="bg-gradient-to-r from-orange-400 to-yellow-400 rounded-2xl p-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-white rounded-full"><i data-lucide="trophy" class="w-6 h-6 text-orange-500"></i></div>
        <div>
          <h1 class="text-2xl font-black text-white drop-shadow-sm">ハッピー予想AI</h1>
          <p class="text-xs text-orange-50 font-bold">高精度アナリストモード稼働中</p>

      <button onclick="app.renderRankings()" class="flex items-center px-6 py-2 font-black text-orange-600 bg-white rounded-full hover:bg-orange-50 transition-colors">

    <div class="bg-white p-3 rounded-2xl border-2 border-yellow-200 flex flex-col md:flex-row items-center gap-3">
      <div class="flex-1 flex items-center gap-2 w-full">
        <i data-lucide="search" class="w-5 h-5 text-orange-400 ml-2"></i>
        <select id="raceSelect" onchange="app.changeRace(this.value)" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 font-bold text-gray-700 outline-none focus:border-orange-400">
          <option value="" disabled selected>👉 レースを選択、またはAIに探してもらおう！</option>
        </select>
      </div>
      <button id="aiBtn" onclick="app.researchAI()" class="w-full md:w-auto flex justify-center items-center px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors">
        <i data-lucide="bot" id="aiBtnIcon" class="w-4 h-4 mr-2"></i> 
        <span id="aiBtnText">アナリストAIに精密調査を依頼</span>
      </button>
    </div>

    <!-- エラー・ログ表示用コンテナ -->
    <div id="error-message" class="hidden bg-red-50 border-2 border-red-200 text-red-800 p-4 rounded-2xl text-center mb-4 flex flex-col items-center shadow-sm relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-red-400"></div>
        <div id="error-content" class="w-full"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      
      <div class="space-y-4">
        <div class="bg-white rounded-2xl border-2 border-orange-100 overflow-hidden min-h-[300px]">
          <div class="p-3 bg-orange-50 flex justify-between items-center border-b border-orange-100">
            <div>
              <h2 id="raceTitle" class="text-lg font-black text-orange-800 flex items-center">
                <i data-lucide="flag" class="w-5 h-5 mr-1 text-orange-500"></i> データ入力
              </h2>
              <p id="raceSubtitle" class="text-xs font-bold text-gray-500 flex items-center mt-1 hidden">

              </p>
            </div>
            <button onclick="app.addHorse()" class="px-3 py-1.5 bg-orange-400 hover:bg-orange-500 text-white text-sm font-bold rounded-full">追加</button>
          </div>

          <div id="emptyDataMsg" class="flex flex-col items-center justify-center h-48 text-orange-300">
            <i data-lucide="bot" class="w-12 h-12 mb-2"></i>
            <p class="font-bold text-sm">上の青いボタンで精密調査を開始！</p>
          </div>

          <div id="horseTableContainer" class="hidden p-2 overflow-x-auto">
            <div class="min-w-[600px] space-y-2">
              <div class="grid grid-cols-12 gap-1 text-xs font-bold text-orange-400 text-center pb-1">
                <div class="col-span-1">枠</div>
                <div class="col-span-3 text-left">馬名</div>
                <div class="col-span-2">オッズ</div>
                <div class="col-span-2">SP(1-100)</div>
                <div class="col-span-3">騎/調/適</div>
                <div class="col-span-1"></div>
              </div>
              <div id="horseList"></div>
            </div>
          </div>
        </div>
        
        <div class="bg-blue-50 p-3 rounded-xl border border-blue-200 text-xs text-blue-800">
            <p class="font-bold flex items-center mb-1"><i data-lucide="bot" class="w-4 h-4 mr-1 text-blue-600"></i>高精度アナリストモードについて</p>
            <p>AIが「持ちタイム」「騎手リーディング」「予想印」などを検索し、論理的な基準で自動算出します。</p>
        </div>
      </div>

      <div class="space-y-4">
        <div class="bg-white rounded-2xl border-2 border-yellow-300 overflow-hidden min-h-[400px]">
          <div class="p-3 bg-gradient-to-r from-yellow-400 to-orange-400 flex justify-between items-center">
            <h2 class="text-lg font-black text-white flex items-center"><i data-lucide="target" class="w-5 h-5 mr-1"></i> お宝ランキング</h2>
          </div>
          
          <div id="rankingContainer" class="p-3 space-y-3 bg-orange-50/20 h-full">
             <div id="emptyRankingMsg" class="flex flex-col items-center justify-center py-10 text-orange-300">
              <i data-lucide="target" class="w-10 h-10 mb-2"></i>
              <p class="font-bold">データを入れてね！</p>
            </div>
            <div id="rankingList"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- 内部ロギングシステム ---
    const appLogs = [];

    function addLog(level, message, details = "") {
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}.${now.getMilliseconds()}`;
        const detailStr = typeof details === 'object' ? JSON.stringify(details) : String(details);
        
        appLogs.push({ time: timeStr, level, message, details: detailStr });
        
        if(level === 'ERROR' || level === 'WARN') {
            console.error(`[${level}] ${message}`, details);
        } else {
            console.log(`[${level}] ${message}`);
        }
    }

    // HTMLから直接呼べるようにwindowオブジェクトに登録
    window.downloadLogsCSV = function() {
        let csv = '\uFEFF'; 
        csv += '"Time","Level","Message","Details"\n'; 
        
        appLogs.forEach(log => {
            const safeMsg = String(log.message || "").replace(/"/g, '""');
            const safeDetails = String(log.details || "").replace(/"/g, '""');
            csv += `"${log.time}","${log.level}","${safeMsg}","${safeDetails}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `umakatsu_error_logs_${new Date().getTime()}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        addLog("INFO", "エラーログのCSVダウンロードを実行しました");
    }

    function getLogButtonHTML() {
        return `
            <div class="mt-3 w-full flex justify-center">
                <button onclick="downloadLogsCSV()" class="bg-red-100 hover:bg-red-200 text-red-700 px-4 py-2 rounded-lg text-xs font-bold border border-red-300 transition-colors inline-flex items-center shadow-sm cursor-pointer">
                    <i data-lucide="download" class="w-4 h-4 mr-2"></i>
                    内部エラーログ(CSV)を保存して調査
                </button>
            </div>
        `;
    }

    // --- Firebase 初期化 ---
    let auth = null;
    let db = null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    try {
      const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
      if (configStr) {
        const firebaseConfig = JSON.parse(configStr);
        if (Object.keys(firebaseConfig).length > 0) {
          const firebaseApp = initializeApp(firebaseConfig);
          auth = getAuth(firebaseApp);
          db = getFirestore(firebaseApp);
          addLog("INFO", "Firebase initialized successfully");
        }
      }
    } catch(e) {
      addLog("WARN", "Firebase not configured. Using LocalStorage.", e.message);
    }

    // 状態管理
    const state = {
      user: null,
      races: [],
      selectedRaceId: '',
      localHorses: [],
      appApiKey: localStorage.getItem('umakatsu_api_key') || '',
      unsubscribeFirestore: null
    };

    // UI更新用のグローバルオブジェクト
    window.app = {
      login: (e) => {
        if (e) e.preventDefault();
        const key = document.getElementById('apiKeyInput').value.trim();
        if (!key) {
          showToast('APIキーを入力してください', 'error');
          return;
        }
        state.appApiKey = key;
        localStorage.setItem('umakatsu_api_key', key);
        addLog("INFO", "API Key saved and login successful");
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        lucide.createIcons();
        if (state.user || !auth) {
          startFirestoreSync();
        }
      },

      resetApiKey: () => {
        localStorage.removeItem('umakatsu_api_key');
        state.appApiKey = '';
        document.getElementById('apiKeyInput').value = '';
        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        addLog("INFO", "API Key reset");
      },

      changeRace: (raceId) => {
        state.selectedRaceId = raceId;
        const currentRace = state.races.find(r => r.raceId === raceId);
        state.localHorses = currentRace && currentRace.horses ? currentRace.horses : [];
        addLog("INFO", "Race changed", raceId);
        renderUI();
      },

      addHorse: () => {
        if (!state.selectedRaceId) {
          showToast("レースを選択してください", "error");
          return;
        }
        const newNumber = state.localHorses.length > 0 ? Math.max(...state.localHorses.map(h => h.number)) + 1 : 1;
        const newHorse = { id: Date.now(), number: newNumber, name: `追加馬${newNumber}`, odds: 10.0, speed: 70, jockey: 5, condition: 3, suitability: 3 };
        state.localHorses.push(newHorse);
        saveToFirestore();
        renderUI();
      },

      removeHorse: (id) => {
        state.localHorses = state.localHorses.filter(h => h.id !== id);
        saveToFirestore();
        renderUI();
      },

      updateHorse: (id, field, element) => {
        let value = element.value;
        if (field === 'name') value = String(value);
        else value = Number(value);
        state.localHorses = state.localHorses.map(h => h.id === id ? { ...h, [field]: value } : h);
        saveToFirestore();
        app.renderRankings(); 
      },

      renderRankings: () => {
        renderRankingPanel();
        lucide.createIcons();
      },

      // 利用可能な最適なモデルを自動取得する関数
      getBestModel: async () => {
        if (!state.appApiKey) return 'gemini-1.5-flash';

        try {
          addLog("INFO", "Requesting available models list");
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${state.appApiKey}`);
          if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
          
          const data = await response.json();
          const availableModels = data.models.map(m => m.name.replace('models/', ''));

          // Proモデルを避け、Flashモデルを優先する順位リスト
          const preferredModels = [
              'gemini-2.5-flash-preview-09-2025', 
              'gemini-2.5-flash',
              'gemini-1.5-flash-latest',
              'gemini-1.5-flash'
          ];

          for (const preferred of preferredModels) {
              if (availableModels.includes(preferred)) {
                  addLog("INFO", `モデルを選定しました: ${preferred}`);
                  return preferred;
              }
          }

          const fallbackFlash = availableModels.find(m => m.includes('flash') && !m.includes('pro'));
          if (fallbackFlash) {
             addLog("INFO", `フォールバックモデルを選定: ${fallbackFlash}`);
             return fallbackFlash;
          }

          addLog("INFO", "推奨モデルが見つからないためデフォルトを使用します");
          return 'gemini-1.5-flash';

        } catch (e) {
          addLog("WARN", "モデル一覧の取得に失敗したため、デフォルトを使用します。", e.message);
          return 'gemini-1.5-flash';
        }
      },

      // AIリサーチ
      researchAI: async () => {
        if (!state.appApiKey) return;
        
        const btnText = document.getElementById('aiBtnText');
        const btnIcon = document.getElementById('aiBtnIcon');
        const btn = document.getElementById('aiBtn');
        const errorContainer = document.getElementById('error-message');
        
        btn.disabled = true;
        btn.classList.add('opacity-50');
        btnIcon.setAttribute('data-lucide', 'loader-2');
        btnIcon.classList.add('animate-spin');
        btnText.innerText = 'AIモデルの選定と調査準備中...';
        errorContainer.classList.add('hidden');
        lucide.createIcons();

        try {
          addLog("INFO", "AIリサーチ処理を開始します");
          const bestModel = await app.getBestModel();
          btnText.innerText = '調査中...';

          const existingRaceNames = state.races.map(r => r.raceName).join(', ');
          const prompt = `
            あなたはプロの競馬データアナリストです。現在は2026年6月20日（土曜日）です。
            今週末（2026年6月20日〜21日）に開催されるJRAの主要な重賞レースまたはメインレースについて、Google検索を用いて正確な出馬表を調査してください。
            【算出ルール】
            1. レース名、開催競馬場、距離、馬番、馬名を正確に取得。
            2. 「単勝オッズ(odds)」は最新データを反映。
            3. speed(1-100), jockey(1-10), condition(1-5), suitability(1-5) を検索結果から論理的に算出。
            4. 既存データ: [ ${existingRaceNames || 'なし'} ] がある場合はオッズ変動等を含む更新版を作成。ない場合は今週末の注目レースを1〜2つ新規作成。
          `;

          const url = `https://generativelanguage.googleapis.com/v1beta/models/${bestModel}:generateContent?key=${state.appApiKey}`;
          
          let res;
          for (let i = 0; i < 3; i++) {
            try {
              addLog("INFO", `Gemini API リクエスト送信 (${i+1}/3)`, url);
              res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  tools: [{ google_search: {} }],
                  systemInstruction: { parts: [{ text: "プロのアナリストとして、指示された正確なJSONスキーマのみを出力してください。" }]},
                  generationConfig: { 
                    responseMimeType: "application/json",
                    responseSchema: {
                      type: "OBJECT",
                      properties: {
                        races: { type: "ARRAY", items: { type: "OBJECT", properties: {
                          raceId: { type: "STRING" }, raceName: { type: "STRING" }, date: { type: "STRING" }, track: { type: "STRING" }, distance: { type: "STRING" },
                          horses: { type: "ARRAY", items: { type: "OBJECT", properties: {
                            id: { type: "NUMBER" }, number: { type: "NUMBER" }, name: { type: "STRING" }, odds: { type: "NUMBER" }, speed: { type: "NUMBER" }, jockey: { type: "NUMBER" }, condition: { type: "NUMBER" }, suitability: { type: "NUMBER" }
                          }}}
                        }}}
                      }
                    }
                  }
                })
              });
              
              if (res.ok) {
                  addLog("INFO", "Gemini API リクエスト成功");
                  break;
              } else {
                  const errText = await res.text();
                  addLog("WARN", `API非正常終了 Status: ${res.status}`, errText);
                  if (i === 2) throw new Error(`HTTP Error: ${res.status} - ${errText}`);
              }
            } catch (e) {
              addLog("WARN", `通信エラー (${i+1}回目)`, e.message);
              if (i === 2) throw e;
              await new Promise(r => setTimeout(r, 1500));
            }
          }

          const data = await res.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (text) {
            btnText.innerText = '保存中...';
            addLog("INFO", "JSONデータのパースと保存を開始");
            const parsed = JSON.parse(text);
            if (parsed && parsed.races) {
              let lastId = state.selectedRaceId;
              for (const race of parsed.races) {
                if (db && state.user && state.user.uid !== 'local_user') {
                  const raceRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'races', race.raceId);
                  await setDoc(raceRef, race, { merge: true });
                } else {
                  const existingIdx = state.races.findIndex(r => r.raceId === race.raceId);
                  if (existingIdx >= 0) {
                    state.races[existingIdx] = { ...state.races[existingIdx], ...race };
                  } else {
                    state.races.push(race);
                  }
                }
                lastId = race.raceId;
              }

              if (!db || (state.user && state.user.uid === 'local_user')) {
                state.races.sort((a, b) => (!b.date ? -1 : !a.date ? 1 : new Date(b.date) - new Date(a.date)));
                localStorage.setItem('umakatsu_races', JSON.stringify(state.races));
                addLog("INFO", "Local storage updated");
              }

              if (lastId) {
                app.changeRace(lastId);
                showToast("詳細なレース調査と更新が完了しました！", "success");
              }
            }
          } else {
              throw new Error("AIが有効なテキストを返しませんでした。");
          }
        } catch (e) {
          addLog("ERROR", "APIリサーチ処理中に重大なエラーが発生しました", e.message || e);
          console.error(e);
          showToast("調査に失敗しました", "error");
          
          // エラーメッセージとログダウンロードボタンの表示
          const errorContent = document.getElementById('error-content');
          errorContent.innerHTML = `
              <div class="font-black mb-1">AI調査中にエラーが発生しました</div>
              <div class="text-[11px] text-red-600 font-mono break-all mb-2 text-left bg-red-100 p-2 rounded">${e.message}</div>
              ${getLogButtonHTML()}
          `;
          errorContainer.classList.remove('hidden');
        } finally {
          btn.disabled = false;
          btn.classList.remove('opacity-50');
          btnIcon.setAttribute('data-lucide', 'bot');
          btnIcon.classList.remove('animate-spin');
          btnText.innerText = 'アナリストAIに精密調査を依頼';
          lucide.createIcons();
        }
      }
    };

    // --- イベントリスナー設定 ---
    document.getElementById('loginForm').addEventListener('submit', app.login);

    if (state.appApiKey) {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
    }

    const initAuth = async () => {
      if (!auth) {
        state.user = { uid: 'local_user' };
        if (state.appApiKey) startFirestoreSync();
        return;
      }
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        addLog("ERROR", "Auth error", err);
      }
    };

    if (auth) {
      onAuthStateChanged(auth, (user) => {
        state.user = user;
        if (state.user && state.appApiKey) {
          startFirestoreSync();
        }
      });
    }

    initAuth();
    lucide.createIcons();

    function startFirestoreSync() {
      if (!db || (state.user && state.user.uid === 'local_user')) {
        const saved = localStorage.getItem('umakatsu_races');
        if (saved) {
          state.races = JSON.parse(saved);
        }
        if (state.selectedRaceId) {
          const currentRace = state.races.find(r => r.raceId === state.selectedRaceId);
          if (currentRace) state.localHorses = currentRace.horses || [];
        }
        renderSelect();
        renderUI();
        return;
      }

      if (state.unsubscribeFirestore) state.unsubscribeFirestore();
      
      const racesRef = collection(db, 'artifacts', appId, 'users', state.user.uid, 'races');
      state.unsubscribeFirestore = onSnapshot(query(racesRef), (snapshot) => {
        const raceData = [];
        snapshot.forEach(doc => raceData.push({ id: doc.id, ...doc.data() }));
        raceData.sort((a, b) => (!b.date ? -1 : !a.date ? 1 : new Date(b.date) - new Date(a.date)));
        state.races = raceData;
        
        if (state.selectedRaceId) {
          const currentRace = state.races.find(r => r.raceId === state.selectedRaceId);
          if (currentRace) state.localHorses = currentRace.horses || [];
        }
        renderSelect();
        renderUI();
      }, (error) => {
        addLog("ERROR", "Firestore sync error", error);
        showToast("データの同期に失敗しました", "error");
      });
    }

    async function saveToFirestore() {
      if (!state.selectedRaceId) return;
      if (db && state.user && state.user.uid !== 'local_user') {
        try {
          const raceRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'races', state.selectedRaceId);
          await setDoc(raceRef, { horses: state.localHorses }, { merge: true });
        } catch (e) {
          addLog("ERROR", "Firestore save error", e);
          showToast("保存エラー", "error");
        }
      } else {
        const raceIdx = state.races.findIndex(r => r.raceId === state.selectedRaceId);
        if (raceIdx >= 0) {
          state.races[raceIdx].horses = state.localHorses;
        }
        localStorage.setItem('umakatsu_races', JSON.stringify(state.races));
      }
    }

    function getNumberColor(num) {
      const colors = [
        'bg-white text-gray-800 border-gray-300', 'bg-gray-800 text-white border-gray-900', 'bg-red-500 text-white border-red-600', 'bg-blue-500 text-white border-blue-600',
        'bg-yellow-400 text-gray-900 border-yellow-500', 'bg-green-500 text-white border-green-600', 'bg-orange-500 text-white border-orange-600', 'bg-pink-400 text-white border-pink-500',
      ];
      return colors[(num - 1) % 8] || colors[0];
    }

    function renderSelect() {
      const select = document.getElementById('raceSelect');
      select.innerHTML = '<option value="" disabled ' + (!state.selectedRaceId ? 'selected' : '') + '>👉 レースを選択、またはAIに探してもらおう！</option>';
      state.races.forEach(r => {
        const isSelected = r.raceId === state.selectedRaceId ? 'selected' : '';
        const dateStr = r.date ? `${r.date} ` : '';
        select.innerHTML += `<option value="${r.raceId}" ${isSelected}>${dateStr}${r.raceName}</option>`;
      });
    }

    function renderUI() {
      const currentRaceInfo = state.races.find(r => r.raceId === state.selectedRaceId);
      
      document.getElementById('raceTitle').innerHTML = `<i data-lucide="flag" class="w-5 h-5 mr-1 text-orange-500"></i> ${currentRaceInfo ? currentRaceInfo.raceName : 'データ入力'}`;
      
      if (currentRaceInfo) {
        document.getElementById('raceSubtitle').classList.remove('hidden');
        document.getElementById('raceSubtitleText').innerText = `${currentRaceInfo.date || '未定'} / ${currentRaceInfo.track}・${currentRaceInfo.distance}`;
        document.getElementById('emptyDataMsg').classList.add('hidden');
        document.getElementById('horseTableContainer').classList.remove('hidden');
      } else {
        document.getElementById('raceSubtitle').classList.add('hidden');
        document.getElementById('emptyDataMsg').classList.remove('hidden');
        document.getElementById('horseTableContainer').classList.add('hidden');
      }

      const listDiv = document.getElementById('horseList');
      listDiv.innerHTML = '';
      
      state.localHorses.forEach(horse => {
        listDiv.innerHTML += `
          <div class="grid grid-cols-12 gap-1 items-center bg-gray-50 p-1.5 rounded-lg border border-gray-100 mb-2">
            <div class="col-span-1 flex justify-center">
              <input type="number" value="${horse.number}" onchange="app.updateHorse(${horse.id}, 'number', this)" class="w-8 h-8 text-center font-bold text-sm rounded border border-gray-200 outline-none focus:border-orange-400 ${getNumberColor(horse.number)}" />
            </div>
            <div class="col-span-3">
              <input type="text" value="${horse.name}" onchange="app.updateHorse(${horse.id}, 'name', this)" class="w-full bg-white border border-gray-200 rounded px-2 py-1 text-sm font-bold outline-none focus:border-orange-400" />
            </div>
            <div class="col-span-2 flex justify-center">
              <input type="number" step="0.1" value="${horse.odds}" onchange="app.updateHorse(${horse.id}, 'odds', this)" class="w-14 bg-yellow-50 border border-yellow-200 rounded px-1 py-1 text-right text-orange-600 font-bold text-sm outline-none" />
            </div>
            <div class="col-span-2 flex justify-center">
              <input type="number" value="${horse.speed}" onchange="app.updateHorse(${horse.id}, 'speed', this)" class="w-12 bg-white border border-gray-200 rounded px-1 py-1 text-center font-bold text-sm outline-none" />
            </div>
            <div class="col-span-3 flex justify-center gap-1">
                <input type="number" max="10" min="1" value="${horse.jockey}" onchange="app.updateHorse(${horse.id}, 'jockey', this)" class="w-7 h-7 border border-gray-200 rounded text-center text-xs" title="騎手" />
                <input type="number" max="5" min="1" value="${horse.condition}" onchange="app.updateHorse(${horse.id}, 'condition', this)" class="w-7 h-7 border border-gray-200 rounded text-center text-xs" title="調子" />
                <input type="number" max="5" min="1" value="${horse.suitability}" onchange="app.updateHorse(${horse.id}, 'suitability', this)" class="w-7 h-7 border border-gray-200 rounded text-center text-xs" title="適性" />
            </div>
            <div class="col-span-1 flex justify-center">
              <button onclick="app.removeHorse(${horse.id})" class="p-1 text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
        `;
      });

      renderRankingPanel();
      lucide.createIcons();
    }

    function renderRankingPanel() {
      const rankingList = document.getElementById('rankingList');
      const emptyMsg = document.getElementById('emptyRankingMsg');
      
      rankingList.innerHTML = '';

      if (!state.selectedRaceId || state.localHorses.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }
      emptyMsg.classList.add('hidden');

      const scoredHorses = state.localHorses.map(horse => {
        const rawScore = (Number(horse.speed) * 0.5) + (Number(horse.jockey) * 10 * 0.2) + (Number(horse.condition) * 20 * 0.15) + (Number(horse.suitability) * 20 * 0.15);
        return { ...horse, rawScore, weight: Math.pow(rawScore, 3) };
      });
      const totalWeight = scoredHorses.reduce((sum, h) => sum + h.weight, 0);

      const analyzed = scoredHorses.map(horse => {
        const predictedProb = totalWeight > 0 ? horse.weight / totalWeight : 0;
        const impliedProb = horse.odds > 0 ? 1 / Number(horse.odds) : 0;
        const expectedValue = predictedProb * Number(horse.odds);

        let evaluation = { label: 'C', word: '見送り', style: 'bg-gray-200 text-gray-600' };
        if (expectedValue >= 1.5) evaluation = { label: 'SS', word: '超大当たり!', style: 'bg-pink-500 text-white' };
        else if (expectedValue >= 1.2) evaluation = { label: 'S', word: '大チャンス', style: 'bg-orange-500 text-white' };
        else if (expectedValue >= 1.0) evaluation = { label: 'A', word: 'イイね!', style: 'bg-yellow-400 text-orange-900' };
        else if (expectedValue >= 0.8) evaluation = { label: 'B', word: 'おさえ', style: 'bg-blue-100 text-blue-700' };

        return {
          ...horse,
          predictedProb: (predictedProb * 100).toFixed(1),
          impliedProb: (impliedProb * 100).toFixed(1),
          expectedValue: expectedValue.toFixed(2),
          evaluation
        };
      }).sort((a, b) => b.expectedValue - a.expectedValue);

      analyzed.forEach(horse => {
        const width = Math.min(horse.expectedValue * 100 / 2.0, 100);
        const barColor = horse.expectedValue >= 1.5 ? 'bg-pink-400' : horse.expectedValue >= 1.2 ? 'bg-orange-400' : horse.expectedValue >= 1.0 ? 'bg-yellow-400' : 'bg-gray-300';
        const fireIcon = horse.expectedValue >= 1.0 ? '🔥 ' : '';
        const numColor = getNumberColor(horse.number);

        rankingList.innerHTML += `
          <div class="bg-white rounded-xl border border-gray-200 p-3 shadow-sm mb-3 relative">
            <div class="flex justify-between items-center mb-2">
              <div class="flex items-center gap-2">
                <div class="w-6 h-6 flex items-center justify-center rounded border font-bold text-xs ${numColor}">${horse.number}</div>
                <span class="font-black text-gray-800">${horse.name}</span>
              </div>
              <span class="text-xs font-bold px-2 py-1 rounded-full ${horse.evaluation.style}">${horse.evaluation.word}</span>
            </div>

            <div class="mb-2 bg-orange-50 p-2 rounded-lg">
              <div class="flex justify-between text-xs font-bold mb-1">
                <span class="text-orange-800">期待値</span>
                <span class="${horse.expectedValue >= 1.0 ? 'text-orange-600' : 'text-gray-500'}">${fireIcon}${horse.expectedValue}</span>
              </div>
              <div class="h-2 w-full bg-white rounded-full overflow-hidden border border-orange-100 relative">
                <div class="absolute top-0 bottom-0 w-0.5 bg-red-400 z-10" style="left: 50%"></div>
                <div class="h-full ${barColor}" style="width: ${width}%"></div>
              </div>
            </div>

            <div class="flex justify-between text-center text-xs">
              <div><p class="text-gray-400">AI勝率</p><p class="font-bold text-blue-600">${horse.predictedProb}%</p></div>
              <div><p class="text-gray-400">みんなの勝率</p><p class="font-bold text-gray-600">${horse.impliedProb}%</p></div>
              <div><p class="text-gray-400">オッズ</p><p class="font-bold text-orange-600">${horse.odds}倍</p></div>
            </div>
          </div>
        `;
      });
    }

    let toastTimeout;
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      
      toastMsg.innerText = msg;
      
      if (type === 'error') {
        toast.style.backgroundColor = '#fee2e2';
        toast.style.color = '#991b1b';
      } else {
        toast.style.backgroundColor = '#dcfce7';
        toast.style.color = '#166534';
      }

      toast.classList.remove('hidden');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.add('hidden');
      }, 3000);
    }
  </script>
</body>
</html>

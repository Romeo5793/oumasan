<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>お馬さんトレジャー V6</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="お馬さんトレジャー V6">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23f97316%22/><text y=%2254%25%22 x=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22>🐴</text></svg>">
  
  <script>
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 180;
      canvas.height = 180;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f97316';
      ctx.fillRect(0, 0, 180, 180);
      ctx.font = '100px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🐴', 90, 100);
      const link = document.createElement('link');
      link.rel = 'apple-touch-icon';
      link.href = canvas.toDataURL('image/png');
      document.head.appendChild(link);
    })();
  </script>
  
  <!-- ライブラリ＆フォント読み込み -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 237, 213, 0.5); border-radius: 10px; margin: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(251, 146, 60, 0.6); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(249, 115, 22, 0.9); }
    
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    .toast-anim { animation: slideDown 0.3s ease-out forwards; }

    /* 背景のドット（アニメーションなしで軽量化） */
    .bg-static-dots {
      background-image: radial-gradient(#ffb74d 2px, transparent 2px);
      background-size: 24px 24px;
    }

    /* 桃鉄風の派手に跳ねるタイトル文字 (お馬さんトレジャー) */
    .momo-title span {
      display: inline-block;
      color: #fff;
      -webkit-text-stroke: 2px #d84315;
      paint-order: stroke fill;
      text-shadow: 2px 2px 0px #d84315, 4px 4px 0px rgba(0,0,0,0.3);
      animation: charBounce 1s infinite;
    }
    .momo-title span.v3-badge {
      -webkit-text-stroke: 1px #fff;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
    }
    .momo-title span:nth-child(1) { color: #FFEB3B; animation-delay: 0.0s; } /* お */
    .momo-title span:nth-child(2) { color: #FF9800; animation-delay: 0.1s; } /* 馬 */
    .momo-title span:nth-child(3) { color: #4CAF50; animation-delay: 0.2s; } /* さ */
    .momo-title span:nth-child(4) { color: #03A9F4; animation-delay: 0.3s; } /* ん */
    .momo-title span:nth-child(6) { color: #9C27B0; animation-delay: 0.4s; } /* ト */
    .momo-title span:nth-child(7) { color: #E91E63; animation-delay: 0.5s; } /* レ */
    .momo-title span:nth-child(8) { color: #FFEB3B; animation-delay: 0.6s; } /* ジ */
    .momo-title span:nth-child(9) { color: #00BCD4; animation-delay: 0.7s; } /* ャ */
    .momo-title span:nth-child(10) { color: #FF5722; animation-delay: 0.8s; } /* ー */
    
    @keyframes charBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.1) rotate(5deg); }
    }

    /* 画面を横切る馬のアニメーション (軽量・最前面・向き修正) */
    @keyframes crossRight {
      /* 🐎はデフォルトで左向きなので、右に進む時は反転(scaleX(-1))させる */
      0% { transform: translateX(-100px) scaleX(-1); }
      100% { transform: translateX(100vw) scaleX(-1); }
    }
    @keyframes crossLeft {
      /* 左に進む時はそのままの向き */
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100px); }
    }
    .horse-crossing {
      position: fixed;
      pointer-events: none;
      z-index: 9999; /* 最前面に表示 */
      font-size: 3rem;
      will-change: transform;
    }

    @keyframes horseDash {
      0% { transform: translateX(-3px) skewX(0deg); }
      50% { transform: translateX(3px) skewX(-15deg); }
      100% { transform: translateX(-3px) skewX(0deg); }
    }
    .horse-dash { display: inline-block; animation: horseDash 0.2s infinite; }

    @keyframes goldPulse {
      0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); border-color: #facc15; }
      70% { box-shadow: 0 0 0 10px rgba(250, 204, 21, 0); border-color: #fbbf24; }
      100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); border-color: #facc15; }
    }
    .gold-pulse {
      animation: goldPulse 2s infinite;
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      border-width: 2px;
    }

    .fun-input { transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .fun-input:focus {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 4px 12px rgba(249, 115, 22, 0.35);
      z-index: 10;
    }
    
    @keyframes hop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .hover-hop:hover { animation: hop 0.4s ease; }

    /* 期待値メーターのお馬さん（ぴょこぴょこ＆前面） */
    @keyframes horseDashMeter {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-5px); }
    }
    .racing-horse {
      position: absolute;
      top: -25px;
      font-size: 2rem;
      transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
      animation: horseDashMeter 0.4s infinite;
      z-index: 50; /* バーよりも前面に配置 */
    }
  </style>
</head>
<body class="bg-[#FFF8E1] text-gray-900 min-h-screen pb-10 relative bg-static-dots overflow-x-hidden">

  <!-- トースト通知 -->
  <div id="toast" class="hidden fixed top-4 left-1/2 z-50 flex items-center px-5 py-3 rounded-2xl shadow-lg font-bold text-sm toast-anim text-white">
    <span id="toastMsg"></span>
  </div>

  <!-- エラーログ表示モーダル -->
  <div id="errorLogModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/70 p-4 backdrop-blur-sm relative z-50">

      <button onclick="document.getElementById('errorLogModal').classList.add('hidden')" class="px-4 py-3 bg-gray-800 hover:bg-black text-white font-bold rounded-xl active:scale-95 transition-all">閉じる</button>
    </div>
  </div>

  <!-- ログイン画面 -->
  <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4 relative z-10">
    <div class="bg-white/95 backdrop-blur-md p-6 sm:p-8 rounded-3xl shadow-2xl max-w-md w-full border-4 border-yellow-400">
      <div class="flex justify-center mb-6 relative">
        <div class="p-4 bg-gradient-to-tr from-orange-100 to-yellow-50 rounded-full border-2 border-orange-300 shadow-inner relative z-10 animate-bounce">
          <i data-lucide="bot" class="w-16 h-16 text-orange-600"></i>
        </div>
      </div>
      
      <!-- 桃鉄風ド派手で可愛いタイトル -->
      <h1 class="text-[2rem] sm:text-4xl font-black text-center mb-8 flex justify-center items-end momo-title tracking-tight pb-2">
        <span>お</span><span>馬</span><span>さ</span><span>ん</span><br class="sm:hidden"/><span>ト</span><span>レ</span><span>ジ</span><span>ャ</span><span>ー</span><span class="v3-badge text-2xl ml-2 text-red-500 drop-shadow-md" style="animation: none; transform: translateY(-5px);">V6</span>
      </h1>
      
      <form id="loginForm" class="space-y-5 relative z-10">
        <div>
          <label class="block text-sm font-bold text-gray-800 mb-2 ml-1">APIキー (パスワード)</label>
          <input 
            type="password" 
            id="apiKeyInput"
            class="w-full bg-gray-50 border-2 border-gray-300 rounded-2xl px-4 py-4 text-base font-bold text-gray-900 outline-none focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-200 transition-all fun-input"
            placeholder="Gemini API Key (テストは 'demo')"
            required
          />
        </div>
        <button 
          type="submit"
          class="w-full flex justify-center items-center px-6 py-4 bg-gradient-to-b from-gray-800 to-black hover:from-black hover:to-gray-900 text-white font-black rounded-2xl shadow-[0_6px_0_#333] active:shadow-[0_0px_0_#333] active:translate-y-[6px] transition-all text-lg"
        >
          出発進行ーっ！ 🚂💨
        </button>
      </form>
    </div>
  </div>

  <div id="mainApp" class="hidden max-w-6xl mx-auto space-y-4 p-3 sm:p-4 relative z-10">
    <!-- ナビゲーション -->
    <div class="flex justify-end gap-2 px-1 relative z-20">
      <button onclick="window.open('https://www.jra.go.jp/kouyu/app/', '_blank')" class="flex items-center gap-1.5 px-4 py-2 bg-white/90 backdrop-blur-sm text-green-800 text-xs font-black rounded-full border-2 border-green-300 hover:bg-green-100 shadow-sm active:scale-95 transition-all">
        <i data-lucide="smartphone" class="w-4 h-4"></i> アプリ
      </button>
      <button onclick="window.open('https://www.ipat.jra.go.jp/', '_blank')" class="flex items-center gap-1.5 px-4 py-2 bg-green-600 text-white text-xs font-black rounded-full hover:bg-green-700 shadow-sm active:scale-95 transition-all border-2 border-green-700">
        <i data-lucide="external-link" class="w-4 h-4"></i> 即PAT
      </button>
    </div>

    <!-- ヘッダー -->
    <header class="bg-gradient-to-r from-orange-500 via-red-500 to-pink-500 rounded-3xl p-3 sm:p-5 flex items-center justify-between shadow-lg relative overflow-hidden border-b-4 border-orange-700">
      <div class="absolute -right-2 -top-2 opacity-30 text-7xl animate-pulse">🏇</div>
      <div class="absolute left-1/4 -top-6 opacity-20 text-6xl rotate-12">🎉</div>
      <div class="absolute left-1/2 bottom-0 opacity-20 text-5xl -rotate-12">💰</div>

      <div class="flex items-center space-x-3 relative z-10">
        <div class="p-2 sm:p-3 bg-white/30 backdrop-blur-md rounded-2xl border-2 border-white/50 text-yellow-100 shadow-inner">
          <i data-lucide="trophy" class="w-6 h-6 sm:w-8 sm:h-8"></i>
        </div>
        <div>
          <!-- ヘッダータイトルも見やすく -->
          <h1 class="text-xl sm:text-3xl font-black leading-tight flex items-end momo-title tracking-tight pb-1">
             <span>お</span><span>馬</span><span>さ</span><span>ん</span><span class="hidden sm:inline">ト</span><span class="hidden sm:inline">レ</span><span class="hidden sm:inline">ジ</span><span class="hidden sm:inline">ャ</span><span class="hidden sm:inline">ー</span><span class="v3-badge text-lg sm:text-xl ml-1 text-red-200 drop-shadow-sm" style="animation: none;">V6</span>
          </h1>
          <p class="text-[10px] sm:text-xs text-white font-black mt-1 drop-shadow-md bg-black/20 px-2 py-0.5 rounded-full w-fit">✨ 高精度アナリストモード稼働中 ✨</p>
        </div>
      </div>
      <button onclick="app.renderRankings(true)" class="flex items-center px-4 py-2 sm:px-6 sm:py-3 font-black text-orange-900 bg-yellow-400 rounded-full hover:bg-yellow-300 shadow-[0_4px_0_#F57F17] active:shadow-[0_0px_0_#F57F17] active:translate-y-[4px] transition-all text-xs sm:text-base relative z-10 border-2 border-yellow-500">
        <i data-lucide="sparkles" class="w-5 h-5 mr-1 text-orange-800"></i> <span class="hidden sm:inline">再計算する！</span><span class="sm:hidden">計算</span>
      </button>
    </header>

    <!-- コントロールパネル -->
    <div class="bg-white/95 backdrop-blur-md p-3 sm:p-5 rounded-3xl border-2 border-white shadow-lg flex flex-col gap-3 relative z-10">
      <div class="relative w-full">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i data-lucide="search" class="w-6 h-6 text-blue-600"></i>
        </div>
        <select id="raceSelect" onchange="app.changeRace(this.value)" class="w-full bg-blue-50 border-2 border-blue-200 rounded-2xl pl-12 pr-10 py-4 text-sm sm:text-base font-black text-blue-900 outline-none focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-100 transition-all appearance-none cursor-pointer shadow-sm fun-input">
          <option value="" disabled selected>👉 ここをタップしてレースを選ぶか、AIに探してもらおう！</option>
        </select>
        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
          <i data-lucide="chevron-down" class="w-6 h-6 text-blue-500"></i>
        </div>
      </div>
      <!-- V6 差分調査ボタン -->
      <button id="aiBtn" onclick="app.researchAI()" class="w-full flex justify-center items-center px-4 py-4 bg-gradient-to-b from-blue-500 to-blue-700 hover:from-blue-400 hover:to-blue-600 text-white font-black rounded-2xl shadow-[0_6px_0_#1E3A8A] active:shadow-[0_0px_0_#1E3A8A] active:translate-y-[6px] transition-all text-base sm:text-xl border-2 border-blue-800">
        <i data-lucide="bot" id="aiBtnIcon" class="w-7 h-7 mr-2"></i> 
        <span id="aiBtnText">最新データで差分調査＆更新する 🚀</span>
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 relative z-10">
      <!-- 左側：データ入力パネル -->
      <div class="space-y-3">
        <div class="bg-white/95 backdrop-blur-sm rounded-3xl border-2 border-orange-300 shadow-lg overflow-hidden min-h-[300px] flex flex-col relative">
          <div class="absolute bottom-0 left-0 opacity-[0.05] text-9xl pointer-events-none -mb-4 -ml-4">🐴</div>

          <div class="p-3 sm:p-4 bg-gradient-to-r from-orange-100 to-yellow-50 flex justify-between items-center border-b-2 border-orange-200">
            <div>
              <h2 id="raceTitle" class="text-base sm:text-lg font-black text-orange-900 flex items-center drop-shadow-sm">
                <i data-lucide="flag" class="w-5 h-5 mr-1.5 text-orange-700"></i> データ入力ステーション
              </h2>
              <p id="raceSubtitle" class="text-[10px] sm:text-xs font-bold text-orange-800 flex items-center mt-1 hidden bg-white/70 px-2 py-0.5 rounded-md w-fit border border-orange-200">
                <i data-lucide="calendar" class="w-3 h-3 mr-1"></i> <span id="raceSubtitleText"></span>
              </p>
            </div>
            <button onclick="app.addHorse()" class="flex items-center px-4 py-2.5 bg-white border-2 border-orange-400 text-orange-800 hover:bg-orange-100 text-xs sm:text-sm font-black rounded-full shadow-sm active:scale-95 transition-all">
              <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 追加
            </button>
          </div>

          <div id="emptyDataMsg" class="flex-1 flex flex-col items-center justify-center min-h-[250px] text-orange-800">
            <div class="relative">
              <i data-lucide="bot" class="w-16 h-16 mb-3 text-orange-400 animate-bounce"></i>
              <span class="absolute -top-2 -right-4 text-3xl animate-pulse">🎯</span>
            </div>
            <p class="font-black text-base text-orange-800 bg-orange-100 px-4 py-2 rounded-full border border-orange-300 shadow-sm">上の青いボタンで調査を開始！</p>

                <div class="col-span-2">オッズ</div>
                <div class="col-span-2">SPEED</div>

              </div>
              <div id="horseList" class="space-y-2.5 mt-2"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右側：解析結果パネル -->
      <div class="space-y-3">
        <div class="bg-white/95 backdrop-blur-sm rounded-3xl border-2 border-pink-300 shadow-lg overflow-hidden min-h-[400px] flex flex-col">
          <div class="p-3 sm:p-4 bg-gradient-to-r from-gray-900 to-gray-800 flex justify-between items-center relative overflow-hidden border-b-4 border-pink-500">
            <div class="absolute inset-0 opacity-20 flex flex-wrap gap-4 pointer-events-none p-2 items-center justify-around text-2xl">

            </div>
            <h2 class="text-base sm:text-xl font-black text-white flex items-center relative z-10 drop-shadow-md tracking-widest">
              <i data-lucide="target" class="w-6 h-6 mr-2 text-pink-400"></i> ✨ お宝ランキング ✨
            </h2>
          </div>
          
          <div id="rankingContainer" class="p-3 sm:p-5 bg-gradient-to-b from-gray-100 to-pink-50/50 min-h-[350px] flex-1">

              <i data-lucide="target" class="w-16 h-16 mb-4 text-gray-400"></i>
              <p class="font-black text-base text-gray-600">データがありません</p>
            </div>
            <div id="rankingList" class="space-y-5"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const apiKey = ""; 

    // --- 📋 要求履歴・実装履歴の自己チェック機能 ---
    const appHistory = [
      { date: "2026-06-20", detail: "APIキー入力とdemoキー対応の実装" },
      { date: "2026-06-21", detail: "APIからモデル一覧を自動取得し、PROを除外した中で最適なモデルを自動選択" },
      { date: "2026-06-21", detail: "Liteモデルを除外し、429エラーを回避するフォールバック自己修復機能を追加" },
      { date: "2026-06-21", detail: "桃鉄でゴールした時のような「わちゃわちゃ感・お祭り感」を全画面に徹底的に追加" },
      { date: "2026-06-21", detail: "アプリ名を変更、フォントを丸く可愛くし、メーターの馬を前面に配置してぴょこぴょこ走るように改善" },
      { date: "2026-06-21", detail: "アプリ名にバージョン(V2)を追加し、既存データをベースにした差分調査と評価基準の明確化による精度向上を実装" },
      { date: "2026-06-21", detail: "スマホ発熱対策として背景パーティクルを削除。破損を防ぐためDOM生成・破棄型の『たまに横切るお馬さん』演出を安全に再実装し、V2と統合。" },
      { date: "2026-06-21", detail: "【修正】たまに横切るおうまさんのz-indexを9999に変更し最前表示へ。また、絵文字の向きに合わせて進行方向のアニメーションを修正。" },
      { date: "2026-06-21", detail: "【完全ローカル化(V3)】Firebaseへの依存を完全に排除し、ブラウザのローカルストレージのみで動作する安定版へ移行。起動時のエラーを防ぐためイベントリスナーによる安全な初期化を実装。" },
      { date: "2026-06-21", detail: "【修正】AIによる差分調査・更新後にプルダウンリストが最新データで更新・選択されない不具合を修正(V4)" },
      { date: "2026-06-21", detail: "【変更】ログイン画面の「安定動作ローカル版！」の表示を削除(V5)" },
      { date: "2026-06-21", detail: "【改善】AIのプロンプトを調整し、「今週末の新規レースの追加」を最優先で調査するように指示を強化(V6)" }
    ];
    console.log("=== 📋 開発要件および実装履歴の自己チェック ===");
    appHistory.forEach(h => console.log(`[OK] ${h.date}: ${h.detail}`));

    // --- 軽量で安全な「たまに横切るお馬さん」演出 ---
    function spawnCrossingHorse() {
      const horse = document.createElement('div');
      horse.className = 'horse-crossing drop-shadow-md';
      horse.innerText = '🐎💨';
      
      const top = Math.floor(Math.random() * 70) + 10;
      horse.style.top = `${top}vh`;
      
      const goRight = Math.random() > 0.5;
      const duration = Math.random() * 2 + 2; 

      if (goRight) {
        horse.style.animation = `crossRight ${duration}s linear forwards`;
      } else {
        horse.style.animation = `crossLeft ${duration}s linear forwards`;
      }

      document.body.appendChild(horse);

      horse.addEventListener('animationend', () => {
        horse.remove();
        const nextDelay = (Math.random() * 10000) + 5000;
        setTimeout(spawnCrossingHorse, nextDelay);
      });

    // --- わちゃわちゃ演出：クリックエフェクト ---
    document.addEventListener('click', (e) => {
      const emoji = document.createElement('div');
      emoji.innerText = '✨';
      emoji.className = 'fixed text-2xl pointer-events-none z-[9999] transition-all duration-500 ease-out';

    // --- わちゃわちゃ演出：ド派手な連続紙吹雪 ---
    function firePartyConfetti() {
      if (typeof confetti !== 'function') return;
      const duration = 2500;
      const end = Date.now() + duration;

      (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'] });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'] });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());
    }

    // --- システム基本処理 ---
    const safeStorage = {
      get: (key) => { try { return localStorage.getItem(key); } catch (e) { return window['_safe_' + key] || null; } },
      set: (key, val) => { try { localStorage.setItem(key, val); } catch (e) { window['_safe_' + key] = val; } }
    };

    const state = {
      races: [], selectedRaceId: '', localHorses: [], appApiKey: ''
    };

    const appLogger = {
      logs: [],
      log: function(level, message, details = {}) {
        const time = new Date().toISOString();
        this.logs.push({ time, level, message, details: JSON.stringify(details) });
        console[level === 'error' ? 'error' : 'log'](`[${level.toUpperCase()}] ${message}`, details);
      },
      showModal: function(csvText) {
        document.getElementById('errorLogText').value = csvText;
        document.getElementById('errorLogModal').classList.remove('hidden');
      },
      downloadCSV: function() {
        if (this.logs.length === 0) return;
        const header = "Time,Level,Message,Details\n";
        const csvContent = this.logs.map(l => `"${l.time}","${l.level}","${l.message}","${l.details.replace(/"/g, '""')}"`).join("\n");
        const fullCsv = header + csvContent;
        this.showModal(fullCsv);
        try {
          const blob = new Blob([fullCsv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = `umakatsu_error_log_${new Date().getTime()}.csv`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        } catch (e) {
          console.warn("直接ダウンロードが制限されています。モーダル画面のログを確認してください。");
        }
      }
    };

    window.app = {
      login: (e) => {
        if (e) e.preventDefault();
        let key = document.getElementById('apiKeyInput').value.trim();
        if (!key) { showToast('APIキーを入力してください', 'error'); return; }
        state.appApiKey = key;
        safeStorage.set('umakatsu_api_key', key);
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        if (typeof lucide !== 'undefined') lucide.createIcons();
        loadLocalData();
      },

      changeRace: (raceId) => {
        state.selectedRaceId = raceId;
        const currentRace = state.races.find(r => r.raceId === raceId);
        state.localHorses = currentRace && currentRace.horses ? currentRace.horses : [];
        renderUI();
      },

      addHorse: () => {
        if (!state.selectedRaceId) { showToast("レースを選択してください", "error"); return; }
        const newNumber = state.localHorses.length > 0 ? Math.max(...state.localHorses.map(h => h.number)) + 1 : 1;
        const newHorse = { id: Date.now(), number: newNumber, name: `追加馬${newNumber}`, odds: 10.0, speed: 70, jockey: 5, condition: 3, suitability: 3 };
        state.localHorses.push(newHorse);
        saveData();
        renderUI();
      },

      removeHorse: (id) => {
        state.localHorses = state.localHorses.filter(h => h.id !== id);
        saveData();
        renderUI();
      },

      updateHorse: (id, field, element) => {
        let value = element.value;
        if (field === 'name') value = String(value);
        else value = Number(value);
        state.localHorses = state.localHorses.map(h => h.id === id ? { ...h, [field]: value } : h);
        saveData();
        app.renderRankings(false);
      },

      researchAI: async () => {
        const btn = document.getElementById('aiBtn');
        btn.disabled = true;
        btn.classList.add('opacity-80');
        btn.innerHTML = `<span class="horse-dash text-3xl mr-2 drop-shadow-md">🐴💨</span> <span class="font-black text-yellow-300">猛ダッシュ調査中...!!</span>`;
        if (typeof lucide !== 'undefined') lucide.createIcons();

        try {
          appLogger.log('info', 'AI調査処理(V6 差分更新)を開始しました');
          
          let requestKey = state.appApiKey;
          let candidateModelsNames = ["gemini-2.5-flash", "gemini-1.5-flash"]; 
          
          if (requestKey === "demo" || requestKey === apiKey || requestKey === "") {
            requestKey = apiKey; 
            candidateModelsNames = ["gemini-2.5-flash-preview-09-2025"];
            appLogger.log('info', 'プレビュー環境の固定モデルを使用します。');
          } else {
            appLogger.log('info', '利用可能なモデルリストを取得し、最適なモデルを選択します...');
            try {
              const modelsUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${requestKey}`;
              const modelsRes = await fetch(modelsUrl);
              
              if (modelsRes.ok) {
                const modelsData = await modelsRes.json();
                const candidateModels = modelsData.models.filter(m => 
                  m.supportedGenerationMethods.includes("generateContent") &&
                  m.name.toLowerCase().includes("gemini") &&
                  !m.name.toLowerCase().includes("pro") &&
                  !m.name.toLowerCase().includes("lite") &&
                  !m.name.toLowerCase().includes("vision") &&
                  !m.name.toLowerCase().includes("thinking")
                );
                
                if (candidateModels.length > 0) {
                  candidateModels.sort((a, b) => {
                    const getVer = name => parseFloat(name.match(/\d+\.\d+/) || [0]);
                    const vA = getVer(a.name);
                    const vB = getVer(b.name);
                    if (vA !== vB) return vB - vA;
                    return a.name.length - b.name.length;
                  });
                  candidateModelsNames = candidateModels.map(m => m.name.split('/').pop());
                  appLogger.log('info', `自動取得したモデル候補リスト: ${candidateModelsNames.join(', ')}`);
                }
              }
            } catch (e) {
              appLogger.log('error', 'モデル一覧取得通信エラー', { error: e.message });
            }
          }

          const prompt = `
            あなたはプロの競馬データアナリストです。本日の日付は ${new Date().toLocaleDateString('ja-JP')} です。
            以下の【現在のデータ】をベースに、Google検索を用いて最新のJRA出馬表（netkeiba等）を調査し、データの【差分更新】と【今週の新規レース追加】を行ってください。

            【現在のデータ (JSON)】
            ${JSON.stringify(state.races)}

            【調査・更新ルール】
            1. 【今週末のレースを最優先で追加】現在のデータにない、直近の土日に開催されるJRAの注目重賞レース（またはメインレース）を必ず調査し、新規データとして追加してください。
            2. 【既存データの更新】既存レースの「単勝オッズ(odds)」を最新のものに更新してください。
            3. 枠順が未確定だったものが確定していれば「馬番(number)」を更新してください。
            4. 出走取消の馬がいれば、リストから除外してください。
            5. 各パラメータの評価基準を明確にし、より正確に再計算してください:
               - speed: 過去のスピード指数やタイム実績を元に算出 (1-100)
               - jockey: 騎手のコース勝率やリーディング順位を元に算出 (1-10)
               - condition: 最終追い切りの評価（A〜Cなど）や陣営コメントから算出 (1-5)
               - suitability: コース（芝/ダート、距離）の適性や血統から算出 (1-5)
            
            【重要】出力は以下のJSON構造に厳密に従い、Markdownのコードブロックを含めず純粋なJSONのみ出力してください。
            {"races": [{"raceId": "文字列", "raceName": "文字列", "date": "文字列", "track": "文字列", "distance": "文字列", "horses": [{"id": 1, "number": 1, "name": "文字列", "odds": 1.0, "speed": 50, "jockey": 5, "condition": 3, "suitability": 3}]}]}
          `;

          let res;
          let data;
          let success = false;
          let targetModel = "";

          for (let modelIdx = 0; modelIdx < candidateModelsNames.length; modelIdx++) {
            targetModel = candidateModelsNames[modelIdx];
            appLogger.log('info', `【試行モデル】: ${targetModel}`);
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${targetModel}:generateContent?key=${requestKey}`;
            const delays = [1000, 2000, 4000];
            
            for (let i = 0; i < delays.length; i++) {
              try {
                res = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    tools: [{ google_search: {} }], 
                    systemInstruction: { parts: [{ text: "プロのアナリストとして、指示された正確なJSONフォーマットのみを出力してください。その他の挨拶や解説文は一切不要です。" }]}
                  })
                });
                
                if (res.ok) {
                  data = await res.json();
                  success = true;
                  break;
                } else {
                  appLogger.log('error', `API通信エラー`, { status: res.status });
                  if (res.status === 400 || res.status === 404 || res.status === 429) break; 
                }
              } catch (e) {
                appLogger.log('error', `API例外`, { error: e.message });
              }
              if (!success && i < delays.length - 1) await new Promise(r => setTimeout(r, delays[i]));
            }
            if (success) break;
          }

          if (!success || !data) throw new Error("利用可能なすべてのモデルで調査に失敗しました。");

          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (text) {
            btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 mr-2 animate-spin"></i> 保存中...`;
            if (typeof lucide !== 'undefined') lucide.createIcons();
            
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("解析可能なデータが見つかりませんでした");

            const parsed = JSON.parse(jsonMatch[0]);
            
            if (parsed && parsed.races) {
              let lastId = state.selectedRaceId;
              for (const race of parsed.races) {
                const existingIdx = state.races.findIndex(r => r.raceId === race.raceId);
                if (existingIdx >= 0) state.races[existingIdx] = { ...state.races[existingIdx], ...race };
                else state.races.push(race);
                lastId = race.raceId;
              }

              state.races.sort((a, b) => (!b.date ? -1 : !a.date ? 1 : new Date(b.date) - new Date(a.date)));
              safeStorage.set('umakatsu_races', JSON.stringify(state.races));

              renderSelect(); 

              if (lastId) {
                app.changeRace(lastId);
                document.getElementById('raceSelect').value = lastId;
                
                showToast(`最新データで差分調査＆更新が完了しました！（使用AI: ${targetModel}）`, "success");
                firePartyConfetti();
              }
            }
          }
        } catch (e) {
          showToast(e.message, "error");
          appLogger.log('error', e.message);
          appLogger.downloadCSV();
        } finally {
          btn.disabled = false;
          btn.classList.remove('opacity-80');
          btn.innerHTML = `<i data-lucide="bot" id="aiBtnIcon" class="w-7 h-7 mr-2"></i> <span id="aiBtnText">最新データで差分調査＆更新する 🚀</span>`;
          if (typeof lucide !== 'undefined') lucide.createIcons();
        }
      }
    };

    document.getElementById('loginForm').addEventListener('submit', app.login);

    // 完全ローカルデータの読み込み
    function loadLocalData() {
      const saved = safeStorage.get('umakatsu_races');
      if (saved) {
        state.races = JSON.parse(saved);
      } else {
        state.races = [];
      }
      
      if (state.selectedRaceId) {
        const currentRace = state.races.find(r => r.raceId === state.selectedRaceId);
        if (currentRace) state.localHorses = currentRace.horses || [];
      }
      renderSelect();
      renderUI();
    }

    // 完全ローカルデータへの保存
    function saveData() {
      if (!state.selectedRaceId) return;
      const raceIdx = state.races.findIndex(r => r.raceId === state.selectedRaceId);
      if (raceIdx >= 0) {
        state.races[raceIdx].horses = state.localHorses;
      }
      safeStorage.set('umakatsu_races', JSON.stringify(state.races));
    }

    function getNumberColor(num) {
      const colors = [
        'bg-white text-gray-900 border-gray-400', 'bg-gray-800 text-white border-gray-900', 'bg-red-600 text-white border-red-300', 'bg-blue-600 text-white border-blue-300',
        'bg-yellow-400 text-gray-900 border-yellow-500', 'bg-green-600 text-white border-green-300', 'bg-orange-500 text-white border-orange-300', 'bg-pink-500 text-white border-pink-300',
      ];
      return colors[(num - 1) % 8] || colors[0];
    }

    function renderSelect() {
      const select = document.getElementById('raceSelect');
      select.innerHTML = '<option value="" disabled ' + (!state.selectedRaceId ? 'selected' : '') + '>👉 ここをタップしてレースを選ぶか、AIに探してもらおう！</option>';
      state.races.forEach(r => {
        const isSelected = r.raceId === state.selectedRaceId ? 'selected' : '';
        const dateStr = r.date ? `${r.date} ` : '';
        select.innerHTML += `<option value="${r.raceId}" ${isSelected}>${dateStr}${r.raceName}</option>`;
      });
    }

    function renderUI() {
      const currentRaceInfo = state.races.find(r => r.raceId === state.selectedRaceId);
      
      document.getElementById('raceTitle').innerHTML = `<i data-lucide="flag" class="w-5 h-5 mr-1.5 text-orange-700"></i> データ入力ステーション`;
      
      if (currentRaceInfo) {
        document.getElementById('raceSubtitle').classList.remove('hidden');
        document.getElementById('raceSubtitleText').innerText = `${currentRaceInfo.date || '未定'} / ${currentRaceInfo.track}・${currentRaceInfo.distance}`;

        document.getElementById('horseTableContainer').classList.remove('hidden');

        document.getElementById('horseTableContainer').classList.add('hidden');
      }

      const listDiv = document.getElementById('horseList');
      listDiv.innerHTML = '';
      
      state.localHorses.forEach(horse => {

          <div class="grid grid-cols-12 gap-2 items-center bg-white/95 p-2 sm:p-2.5 rounded-2xl border-2 border-orange-200 shadow-sm hover:shadow-md hover-hop transition-all">

              <input type="number" value="${horse.number}" onchange="app.updateHorse(${horse.id}, 'number', this)" class="fun-input w-10 h-10 text-center font-black text-base rounded-xl border-2 border-gray-300 outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-200 ${getNumberColor(horse.number)}" />
            </div>
            <div class="col-span-3">
              <input type="text" value="${horse.name}" onchange="app.updateHorse(${horse.id}, 'name', this)" class="fun-input w-full bg-orange-50 border-2 border-orange-200 rounded-xl px-3 py-2 text-sm font-black text-gray-900 outline-none focus:border-orange-500 focus:bg-white focus:ring-2 focus:ring-orange-200" />
            </div>

    function renderRankingPanel(playEffect = false) {
      const rankingList = document.getElementById('rankingList');
      const emptyMsg = document.getElementById('emptyRankingMsg');
      
      rankingList.innerHTML = '';

      if (!state.selectedRaceId || state.localHorses.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }
      emptyMsg.classList.add('hidden');

      const scoredHorses = state.localHorses.map(horse => {
        const rawScore = (Number(horse.speed) * 0.5) + (Number(horse.jockey) * 10 * 0.2) + (Number(horse.condition) * 20 * 0.15) + (Number(horse.suitability) * 20 * 0.15);
        return { ...horse, rawScore, weight: Math.pow(rawScore, 3) };
      });
      const totalWeight = scoredHorses.reduce((sum, h) => sum + h.weight, 0);

      const analyzed = scoredHorses.map(horse => {
        const predictedProb = totalWeight > 0 ? horse.weight / totalWeight : 0;
        const impliedProb = horse.odds > 0 ? 1 / Number(horse.odds) : 0;
        const expectedValue = predictedProb * Number(horse.odds);

        let evaluation = { label: 'C', word: '見送り', style: 'bg-gray-300 text-gray-800 border-gray-400 font-bold' };
        if (expectedValue >= 1.5) evaluation = { label: 'SS', word: '超大当たり!', style: 'bg-gradient-to-r from-pink-500 to-rose-600 text-white border-transparent shadow-[0_0_10px_rgba(236,72,153,0.8)]' };
        else if (expectedValue >= 1.2) evaluation = { label: 'S', word: '大チャンス', style: 'bg-gradient-to-r from-orange-500 to-orange-600 text-white border-transparent shadow-[0_0_8px_rgba(249,115,22,0.8)]' };
        else if (expectedValue >= 1.0) evaluation = { label: 'A', word: 'イイね!', style: 'bg-yellow-300 text-orange-900 border-yellow-500 font-black' };
        else if (expectedValue >= 0.8) evaluation = { label: 'B', word: 'おさえ', style: 'bg-blue-100 text-blue-900 border-blue-400 font-bold' };

        return {
          ...horse,
          predictedProb: (predictedProb * 100).toFixed(1),
          impliedProb: (impliedProb * 100).toFixed(1),
          expectedValue: expectedValue.toFixed(2),
          evaluation
        };
      }).sort((a, b) => b.expectedValue - a.expectedValue);

      if (playEffect && analyzed.length > 0 && analyzed[0].expectedValue >= 1.2) {
         firePartyConfetti();
      }

      analyzed.forEach((horse, index) => {
        const width = Math.min(horse.expectedValue * 100 / 2.0, 100);
        const barColor = horse.expectedValue >= 1.5 ? 'bg-gradient-to-r from-pink-500 to-rose-600' : horse.expectedValue >= 1.2 ? 'bg-gradient-to-r from-orange-400 to-orange-600' : horse.expectedValue >= 1.0 ? 'bg-gradient-to-r from-yellow-400 to-yellow-500' : 'bg-gray-400';
        const fireIcon = horse.expectedValue >= 1.0 ? '🔥 ' : '';
        const numColor = getNumberColor(horse.number);
        
        let rankIcon = '';
        let extraCardClass = '';
        let extraNameDecor = '';
        
        if (index === 0) {
            rankIcon = '<i data-lucide="crown" class="w-6 h-6 text-yellow-500 absolute -top-2 -left-2 drop-shadow-[0_2px_2px_rgba(0,0,0,0.5)] z-20 animate-bounce"></i>';
            if(horse.expectedValue >= 1.2) {
                extraCardClass = 'gold-pulse scale-[1.02] z-10 border-yellow-400'; 
                extraNameDecor = '✨';
            }
        } else if (index === 1) rankIcon = '<i data-lucide="crown" class="w-5 h-5 text-gray-400 absolute -top-1 -left-1 drop-shadow-md z-10"></i>';
        else if (index === 2) rankIcon = '<i data-lucide="crown" class="w-5 h-5 text-orange-800 absolute -top-1 -left-1 drop-shadow-md z-10"></i>';

        rankingList.innerHTML += `
          <div class="bg-white rounded-3xl border-2 border-pink-200 p-4 shadow-md hover:shadow-lg transition-all relative overflow-visible ${extraCardClass}">
            <div class="flex justify-between items-center mb-3">
              <div class="flex items-center gap-3 relative z-10">
                <div class="relative">
                  ${rankIcon}
                  <div class="w-10 h-10 flex items-center justify-center rounded-xl border-2 font-black text-lg shadow-sm ${numColor}">${horse.number}</div>
                </div>
                <span class="font-black text-gray-900 text-lg sm:text-xl tracking-tight drop-shadow-sm">${extraNameDecor}${horse.name}${extraNameDecor}</span>
              </div>
              <span class="text-xs sm:text-sm font-black px-4 py-2 rounded-full border ${horse.evaluation.style} relative z-10 tracking-wider">${horse.evaluation.word}</span>
            </div>

            <div class="mb-3 bg-gradient-to-r from-gray-50 to-white p-3 rounded-2xl border-2 border-gray-200 relative z-10 backdrop-blur-sm mt-5 shadow-inner">
              <div class="flex justify-between text-xs sm:text-sm font-black mb-1.5">
                <span class="text-gray-800">期待値メーター</span>
                <span class="${horse.expectedValue >= 1.0 ? 'text-pink-600 text-base drop-shadow-md' : 'text-gray-600'}">${fireIcon}${horse.expectedValue}</span>
              </div>
              <!-- バーの上に馬が走る演出 -->
              <div class="h-3 w-full bg-gray-200 rounded-full overflow-visible relative mt-4 shadow-inner border border-gray-300">
                <div class="racing-horse z-20" style="left: ${width}%">🏇</div>
                <div class="absolute top-0 bottom-0 w-1 bg-red-600 z-10 shadow-[0_0_5px_red]" style="left: 50%"></div>
                <div class="h-full ${barColor} rounded-full transition-all duration-1000 ease-out relative z-0 shadow-sm" style="width: ${width}%"></div>
              </div>
            </div>

            <div class="flex justify-between text-center text-xs sm:text-sm pt-2 px-2 relative z-10 bg-gray-100/80 rounded-xl py-2 border border-gray-200">
              <div><p class="text-gray-700 mb-1 text-[10px] sm:text-xs font-bold">AI勝率</p><p class="font-black text-blue-700 text-base drop-shadow-sm">${horse.predictedProb}%</p></div>
              <div><p class="text-gray-700 mb-1 text-[10px] sm:text-xs font-bold">みんなの勝率</p><p class="font-black text-gray-800 text-base">${horse.impliedProb}%</p></div>
              <div><p class="text-gray-700 mb-1 text-[10px] sm:text-xs font-bold">オッズ</p><p class="font-black text-orange-700 text-base drop-shadow-sm">${horse.odds}倍</p></div>
            </div>
          </div>
        `;
      });
    }

    let toastTimeout;
    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMsg');
      toastMsg.innerText = msg;
      
      if (type === 'error') {
        toast.style.backgroundColor = '#fee2e2';
        toast.style.color = '#991b1b';
      } else {
        toast.style.backgroundColor = '#1f2937';
        toast.style.color = '#ffffff';
      }

      toast.classList.remove('hidden');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // 起動時の初期化を安全に行う（Firebaseなし）
    document.addEventListener('DOMContentLoaded', () => {
      const savedKey = safeStorage.get('umakatsu_api_key');
      if (savedKey) {
        document.getElementById('apiKeyInput').value = savedKey;
        app.login(); // キーがあれば自動ログイン
      }
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });

    // 画面の描画が完全に終わってから安全にお馬さんを走らせる
    window.addEventListener('load', () => {
        setTimeout(spawnCrossingHorse, 3000);
    });

  </script>
</body>
</html>
